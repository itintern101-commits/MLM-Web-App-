    function getQtyForProcess(qtyString, baseCol, defaultQty) {
      // Ensure defaultQty is a number
      const fallback = Number(defaultQty || 0);
      if (!qtyString || qtyString === "0" || qtyString === "")
        return fallback;

      const parts = String(qtyString).split("|");
      for (let p of parts) {
        const pair = p.split(":");
        // Compare as numbers to avoid type mismatches
        if (pair.length === 2 && Number(pair[0]) === Number(baseCol)) {
          return Number(pair[1]);
        }
      }
      return fallback;
    }

    function parseDateStringToTime(dateStr) {
      if (!dateStr || dateStr === "-") return null;
      const parts = dateStr.split("/");
      if (parts.length !== 3) return null;

      const day = parseInt(parts[0], 10);
      const month = parseInt(parts[1], 10) - 1; // JS months are 0-11
      let year = parseInt(parts[2], 10);

      // Handle 2-digit years (e.g., "26" becomes 2026)
      if (year < 100) year += 2000;

      return new Date(year, month, day).getTime();
    }

    function parseMapString(str, fallbackQty) {
      if (!str || str === "0" || str === "") return {};
      const map = {};
      str.split("|").forEach((pair) => {
        const [k, v] = pair.split(":");
        if (k) map[k] = v;
      });
      return map;
    }

    function getMaxQtyForProcess(maxQtyString, baseCol, defaultQty) {
      const fallback = Number(defaultQty || 0);
      if (!maxQtyString || maxQtyString === "0" || maxQtyString === "")
        return fallback;

      const parts = String(maxQtyString).split("|");
      for (let p of parts) {
        const pair = p.split(":");
        if (pair.length === 2 && Number(pair[0]) === Number(baseCol)) {
          return Number(pair[1]);
        }
      }
      // If the specific column isn't found in the MAX string,
      // it MUST be capped by the defaultQty (the current batch size).
      return fallback;
    }

    function syncWaterfallUI() {
      const rows = document.querySelectorAll(".multi-step-row");
      const fmt = (n) => Math.max(0, Math.round(n)).toLocaleString();

      let ceilingIn = null; // effective ceiling passed into this row
      let prevStepName = ""; // name of the row that set the ceiling

      rows.forEach((row, index) => {
        const input = row.querySelector(".step-qty-input");
        if (!input) return;

        const base = input.getAttribute("data-base");
        const systemMax =
          parseInt(input.getAttribute("data-system-max")) || 0;
        const backendQty =
          parseInt(input.getAttribute("data-current-qty")) || 0;
        const userTyped = parseInt(input.value) || 0;
        const stepName = row.getAttribute("data-name");

        // ── Ceiling for this row ──────────────────────────────────────────────
        if (index === 0 || ceilingIn === null) {
          ceilingIn = systemMax;
        } else {
          ceilingIn = Math.min(ceilingIn, systemMax);
        }

        const proposedTotal = backendQty + userTyped;
        const remaining = ceilingIn - proposedTotal; // can go negative
        const isError = proposedTotal > ceilingIn;
        const isFull = remaining === 0 && !isError;

        // ── Update formula ceiling cell ───────────────────────────────────────
        const ceilingValEl = row.querySelector(
          `[data-formula-ceiling="${base}"]`,
        );
        const ceilingLabelEl = row.querySelector(
          `[data-formula-ceiling-label="${base}"]`,
        );
        if (ceilingValEl) ceilingValEl.textContent = fmt(ceilingIn);
        if (ceilingLabelEl) {
          ceilingLabelEl.textContent =
            index > 0 && prevStepName
              ? `Limit from ${prevStepName}`
              : "Order Qty";
        }

        // ── Update "Adding now" cell ──────────────────────────────────────────
        const addingEl = row.querySelector(`[data-formula-adding="${base}"]`);
        if (addingEl) addingEl.textContent = fmt(userTyped);

        // ── Update equation string ────────────────────────────────────────────
        const eqEl = row.querySelector(`[data-formula-eq="${base}"]`);
        if (eqEl) {
          eqEl.textContent = `${fmt(ceilingIn)} - ${fmt(backendQty)} - ${fmt(userTyped)} = ${fmt(remaining)}`;
        }

        // ── Update result value (waterfall-max-label still read by processUpdate) ──
        const resultEl = row.querySelector(`[data-formula-result="${base}"]`);
        if (resultEl) resultEl.textContent = fmt(remaining);

        // ── Update result row colour + label ─────────────────────────────────
        const resultRow = row.querySelector(`[data-formula-row="${base}"]`);
        const resultLabelEl = row.querySelector(
          `[data-formula-result-label="${base}"]`,
        );

        if (resultRow) {
          resultRow.classList.remove("is-error", "is-full");
          if (isError) resultRow.classList.add("is-error");
          else if (isFull) resultRow.classList.add("is-full");
        }
        if (resultLabelEl) {
          resultLabelEl.classList.remove("is-error", "is-full");
          if (isError) {
            resultLabelEl.classList.add("is-error");
            resultLabelEl.textContent = "Exceeds limit — reduce qty";
          } else if (isFull) {
            resultLabelEl.classList.add("is-full");
            resultLabelEl.textContent = "Fully processed";
          } else {
            resultLabelEl.textContent = "Remaining for this process";
          }
        }
        if (resultEl) {
          resultEl.classList.remove("is-error", "is-full");
          if (isError) resultEl.classList.add("is-error");
          else if (isFull) resultEl.classList.add("is-full");
        }

        // ── Input border validation ───────────────────────────────────────────
        if (isError) {
          input.style.border = "2px solid #ef4444";
          input.style.backgroundColor = "#fef2f2";
          input.setAttribute(
            "data-error-source",
            prevStepName || "System Limit",
          );
        } else {
          input.style.border = "1px solid #cbd5e1";
          input.style.backgroundColor = "white";
          input.removeAttribute("data-error-source");
        }

        // ── Pass ceiling to next row ──────────────────────────────────────────
        if (userTyped > 0) {
          // User typed something — next row is limited to this row's output
          ceilingIn = proposedTotal;
          prevStepName = stepName;
        }
        // else: ceilingIn stays, so untouched rows don't collapse the chain
      });
    }

    /**
     * Generic Modal Prompt
     * @param {string} title - Title text
     * @param {string} message - Description text
     * @param {string} placeholder - Input placeholder (if null, input is hidden)
     * @returns {Promise<string|null>} - Returns the string value or null if cancelled
     */
    function customPrompt(title, message, placeholder = "Enter reason...") {
      return new Promise((resolve) => {
        const overlay = document.createElement("div");
        overlay.className = "custom-modal-overlay";
        overlay.style = `
                  position:fixed; top:0; left:0; width:100%; height:100%;
                  background:rgba(15, 23, 42, 0.65); z-index:20000;
                  display:flex; align-items:center; justify-content:center;
                  padding:20px; backdrop-filter: blur(4px);
                `;

        const box = document.createElement("div");
        box.style = `
                  background:white; padding:28px; border-radius:16px;
                  width:100%; max-width:400px;
                  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
                  border: 1px solid #f1f5f9;
                `;

        const inputHtml =
          placeholder !== null
            ? `<input type="text" id="promptInput" placeholder="${placeholder}"
                style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px;
                margin-bottom:24px; font-family:inherit; outline:none; font-size:0.95rem;
                transition: border-color 0.2s;" onfocus="this.style.borderColor='#3b82f6'">`
            : "";

        const confirmText = placeholder === null ? "Proceed" : "Confirm";

        box.innerHTML = `
                  <h3 style="margin:0 0 10px 0; font-size:1.25rem; color:#0f172a; font-weight:700;">${title}</h3>
                  <p style="margin:0 0 24px 0; font-size:0.95rem; color:#64748b; line-height:1.6;">${message}</p>
                  ${inputHtml}
                  <div style="display:flex; justify-content: flex-end; gap:10px;">
                    <button id="promptCancel" style="
                      padding: 10px 18px; background: #fff; color: #64748b;
                      border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer;
                      font-weight: 600; font-size: 0.9rem; transition: all 0.2s;">
                      Cancel
                    </button>
                    <button id="promptConfirm" style="
                      padding: 10px 22px; background: #2563eb; color: white;
                      border: none; border-radius: 8px; cursor: pointer;
                      font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
                      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);">
                      ${confirmText}
                    </button>
                  </div>
                `;

        overlay.appendChild(box);
        document.body.appendChild(overlay);

        // --- BUTTON HOVER EFFECTS ---
        const cancelBtn = document.getElementById("promptCancel");
        const confirmBtn = document.getElementById("promptConfirm");

        cancelBtn.onmouseover = () => {
          cancelBtn.style.background = "#f8fafc";
          cancelBtn.style.borderColor = "#cbd5e1";
        };
        cancelBtn.onmouseout = () => {
          cancelBtn.style.background = "#fff";
          cancelBtn.style.borderColor = "#e2e8f0";
        };

        confirmBtn.onmouseover = () => {
          confirmBtn.style.background = "#1d4ed8";
          confirmBtn.style.transform = "translateY(-1px)";
        };
        confirmBtn.onmouseout = () => {
          confirmBtn.style.background = "#2563eb";
          confirmBtn.style.transform = "translateY(0)";
        };

        const input = document.getElementById("promptInput");
        if (input) input.focus();

        const close = (val) => {
          document.body.removeChild(overlay);
          resolve(val);
        };

        confirmBtn.onclick = () => {
          const val = input ? input.value : true;
          close(val);
        };

        cancelBtn.onclick = () => close(null);

        if (input) {
          input.onkeydown = (e) => {
            if (e.key === "Enter") confirmBtn.click();
            if (e.key === "Escape") cancelBtn.click(); // Added Escape support
          };
        }
      });
    }

        // unless you want the whole process to disappear from view.

    function renderModalHeader(job, mode) {
      // ── Mode badge (only visible in edit mode) ────────────────────────────
      const modeBadgeHtml =
        mode === "edit"
          ? `<div class="um-mode-badge edit">
           <span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>
           Edit mode — adjusting expected dates
         </div>`
          : "";

      // ── Batch switcher ────────────────────────────────────────────────────
      const openerFn = mode === "edit" ? "openEditPopup" : "openUpdatePopup";

      const siblingBatches = MASTER_DATA.filter(
        (b) => String(b.psn).trim() === String(job.psn).trim()
      ).sort((a, b) =>
        String(a.batchId).localeCompare(String(b.batchId), undefined, {
          numeric: true,
        })
      );

      const switcherEl = document.getElementById("batchSwitcher");
      if (!switcherEl) return;


      switcherEl.style.display = "block";
      switcherEl.innerHTML = siblingBatches
        .map((b) => {
          const isCurrent = b.row === job.row;
          const totalSteps = b.steps ? b.steps.length : 0;
          const doneSteps = b.steps
            ? b.steps.filter((s) => s.isDone).length
            : 0;
          const isFullyDone = totalSteps > 0 && doneSteps === totalSteps;
          const hasOverdue = b.steps
            ? b.steps.some((s) => {
              if (s.isDone) return false;
              const t = parseDateStringToTime(s.expDate);
              return t && t < new Date().setHours(0, 0, 0, 0);
            })
            : false;

          let dotColor;
          if (isFullyDone) dotColor = "#22c55e";
          else if (hasOverdue) dotColor = "#ef4444";
          else dotColor = "#f59e0b";

          const chipStyle = isCurrent
            ? `background:#0f172a; color:#ffffff; border-color:#0f172a; font-weight:600; cursor:default;`
            : `background:white; color:#000000; border-color:#e2e8f0; cursor:pointer;`;

          const dotHtml = `<span style="width:6px;height:6px;border-radius:50%;background:${dotColor};display:inline-block;flex-shrink:0;"></span>`;

          // Swapped the order: Label now comes BEFORE the chip in the map
          const currentLabel = isCurrent
            ? `<div style="font-size:10px; text-align:center; color:#ffffff; margin-bottom:2px; font-style:italic;font-weight:bold;">Current</div>`
            : `<div style="height:14px;"></div>`; // Spacer to keep chips aligned

          return `
            <div style="display:inline-flex; flex-direction:column; flex-shrink:0;">
              ${currentLabel}
              <div
                onclick="${isCurrent ? "" : `${openerFn}(${b.row})`}"
                title="Batch ${b.batchId}"
                style="display:inline-flex; flex-direction:column; gap:2px; padding:6px 12px; border-radius:12px; border:1px solid; font-size:12px; transition:box-shadow 0.1s; ${chipStyle}"
                onmouseenter="if(${!isCurrent}) this.style.boxShadow='0 0 0 3px #e2e8f0';"
                onmouseleave="this.style.boxShadow='';"
              >
                <div style="display:flex; align-items:center; gap:6px;">
                  ${dotHtml}
                  <span>${b.batchId}</span>
                  <span style="font-size:10px; opacity:0.8;">(${doneSteps}/${totalSteps})</span>
                </div>
                <div style="font-size:10px; padding-left:12px; opacity:0.9;">
                   Qty: ${b.qty || 0}
                </div>
              </div>
            </div>`;
        })
        .join("");

      requestAnimationFrame(() => {
        // Find the parent container of the chip with cursor:default
        const currentChipContainer = switcherEl.querySelector(
          '[style*="cursor:default"]'
        )?.parentElement;

        if (currentChipContainer)
          currentChipContainer.scrollIntoView({
            behavior: "smooth",
            inline: "center",
            block: "nearest",
          });
      });


      // ── Job name + split notice ───────────────────────────────────────────
      const splitRemarkHtml = job.splitRemark
        ? `<div class="um-split-notice"><strong>Batch origin:</strong> ${job.splitRemark}</div>`
        : "";

      document.getElementById("modalPsn").innerHTML =
        `<div style="font-size:20px; color:#ffffff; margin-bottom:1px; font-weight:bold;">${job.psn}</div>
       <div style="font-size:20px; font-weight:bold; color:#ffffff;">${job.jobName}</div>
       ${splitRemarkHtml}
       <div id="timelineWrapper" style="margin-top: 15px;">
         ${renderProgressTimeline(job)}
       </div>`;
    }

    function renderProgressTimeline(job) {
      if (!job || !job.steps) return "";

      const today = new Date().setHours(0, 0, 0, 0);
      const activeStepIndex = job.steps.findIndex(s => !s.isDone);
      const stepsPerRow = 6;

      const timelineHtml = job.steps.map((step, index) => {
        const isDone = step.isDone;
        const expTime = parseDateStringToTime(step.expDate);
        const endTime = isDone ? parseDateStringToTime(step.endDate) : null;

        const wasDelayed = isDone && endTime && expTime && endTime > expTime;
        const isOverdue = !isDone && expTime && expTime < today;
        const isDelayedManually = step.status === "Delayed";

        const isActive = index === activeStepIndex;
        const isPast = index < activeStepIndex || (activeStepIndex === -1 && isDone);

        // --- RE-ADDED STATUS LOGIC ---
        let statusClass = "um-node-pending";
        if (isDone) {
          statusClass = (wasDelayed || isDelayedManually) ? "um-node-done-delayed" : "um-node-done";
        } else if (isActive) {
          statusClass = (isOverdue || isDelayedManually) ? "um-node-active-delayed" : "um-node-active";
        } else if (isOverdue || isDelayedManually) {
          statusClass = "um-node-pending-delayed";
        }

        let dateLabel = isDone ? "Ends on:" : (isOverdue ? "Overdue:" : "Expected:");
        let dateDisplayValue = isDone ? (step.endDate || 'Done') : (step.expDate || 'N/A');

        const rowIndex = Math.floor(index / stepsPerRow);
        const isReverseRow = rowIndex % 2 !== 0;
        const colIndex = index % stepsPerRow;
        const gridColumn = isReverseRow ? (stepsPerRow - colIndex) : (colIndex + 1);

        const flowAnim = isPast ? 'um-flow-on' : '';
        const isLastInRow = (index + 1) % stepsPerRow === 0;
        const isNotLastOverall = index < job.steps.length - 1;

        let connectors = "";
        if (isNotLastOverall) {
          if (isLastInRow) {
            connectors = `<div class="um-s-bridge ${flowAnim}"></div>`;
          } else {
            connectors = `<div class="um-connector-h ${isReverseRow ? 'rev' : ''} ${flowAnim}"></div>`;
          }
        }

        return `
          <div class="um-step-cell" style="grid-column: ${gridColumn}; grid-row: ${rowIndex + 1};">
            <div class="um-node ${statusClass}">
              <div class="um-node-header" style="min-width: 0;">
                <span class="um-node-seq">${index + 1}</span>
                <span class="um-node-name" title="${step.name}">${step.name}</span>
              </div>
              <div class="um-node-body">
                <div class="um-date-wrapper">
                  <span class="um-date-label">${dateLabel}</span>
                  <div class="um-date">${dateDisplayValue}</div>
                </div>
                <div class="um-qty">Qty: ${getQtyForProcess(job.qtyString, step.baseCol, job.qty)}</div>
              </div>
              ${isActive ? '<div class="um-node-pulse"></div>' : ''}
            </div>
            ${connectors}
          </div>
        `;
      }).join("");

      return `<div class="um-timeline-container">${timelineHtml}</div>`;
    }
  </script>
</body>
