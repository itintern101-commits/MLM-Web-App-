<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar</title>

  <style>
    /* =========================
   LAYOUT
========================= */
    .sidebar-wrapper {
      display: flex;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    /* =========================
   SIDEBAR
========================= */
    .sidebar {
      width: 220px;
      background: #ffffff;
      border-right: 1px solid #e0e0e0;
      transition: width 0.25s ease;
      overflow: hidden;
      position: relative;
    }

    /* COLLAPSED */
    .sidebar--collapsed {
      width: 60px;
    }

    /* =========================
   SIDEBAR HEADER
========================= */
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-bottom: 1px solid #e0e0e0;
    }

    /* LOGO */
    .logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    /* RIGHT SIDE (TEXT + BUTTON) */
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
    }

    /* COMPANY NAME */
    .company-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1f36;
      white-space: nowrap;
    }

    /* =========================
   TOGGLE BUTTON
========================= */

    /* TOGGLE BUTTON */
    .toggle-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: #1a73e8;
      color: white;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* =========================
   MENU
========================= */
    .menu {
      display: flex;
      flex-direction: column;
      padding-top: 10px;
    }

    /* ITEM */
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      text-decoration: none;
      color: #3c4043;
      transition: 0.2s;
      border-left: 4px solid transparent;
    }

    .item:hover {
      background: #f1f3f4;
      color: #1a73e8;
    }

    /* ACTIVE LINK */
    .item.active {
      background: #e8f0fe;
      border-left: 4px solid #1a73e8;
      color: #1a73e8;
      font-weight: 600;
    }

    /* ICON */
    .icon {
      width: 24px;
      text-align: center;
    }

    /* LABEL */
    .label {
      white-space: nowrap;
      transition: opacity 0.15s ease;
      font-size: 20px;
    }

    /* =========================
    COLLAPSED STATE
    ========================= */
    .sidebar--collapsed .sidebar-header {
      justify-content: center;
    }

    /* HIDE TEXT + BUTTON WHEN COLLAPSED */
    .sidebar--collapsed .header-right {
      display: none;
    }

    .sidebar--collapsed .label {
      opacity: 0;
      pointer-events: none;
    }

    /* =========================
   MAIN CONTENT
========================= */
    .main {
      flex: 1;
    }
  </style>
</head>

<body>

  <div class="sidebar-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar sidebar--collapsed" id="sidebar">

      <!-- HEADER -->
      <div class="sidebar-header">

        <!-- LOGO -->
        <img src="/images/MLM Logo.png" alt="Logo" class="logo" id="sidebarLogo">

        <!-- TITLE + TOGGLE (only show when expanded) -->
        <div class="header-right">
          <span class="company-name">MLM Packaging</span>
          <button class="toggle-btn" id="sidebarToggle">☰</button>
        </div>

      </div>

      <!-- MENU -->
      <nav class="menu">

        <a href="/dashboard.html" class="item" data-page="dashboard">
          <span class="icon">📊</span>
          <span class="label">Dashboard</span>
        </a>

        <a href="/createJob.html" class="item" data-page="createJob">
          <span class="icon">➕</span>
          <span class="label">Create Job</span>
        </a>

        <a href="/BatchDetail.html" class="item" data-page="BatchDetail">
          <span class="icon">📋</span>
          <span class="label">Batch Detail</span>
        </a>

        <a href="/JobDetail.html" class="item" data-page="JobDetail">
          <span class="icon">📄</span>
          <span class="label">Job Detail</span>
        </a>

        <a href="/login.html" class="item" id="logoutBtn">
          <span class="icon">🚪</span>
          <span class="label">Logout</span>
        </a>

      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <h2>Page Content Here</h2>
    </main>

  </div>



</body>

</html>
