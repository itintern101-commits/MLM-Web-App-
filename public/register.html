<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#11998e,#38ef7d);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box {
  background: rgba(255,255,255,0.1);
  padding:30px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  background:#28a745;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="box">
  <h2>Register</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>

  <p><a href="login.html">Back to login</a></p>

  <div id="msg"></div>
</div>

<script src="/scripts/register.js"></script>
</body>
</html>
